[server]
MAP = "map.json"
MAX_PLAYER = 10000
SERVER_IP = "localhost"
SERVER_PORT = "50061"
CLIENT_ID = "omobab"
PLAYER_NAME = "player1"
RENDER_DELAY_MS = 100
# 預設場景。run.bat 直接讀此檔；run_stress.bat 會臨時 swap 成 game_stress.toml
# (STORY = TD_STRESS) 並在結束時自動還原。
STORY = "TD_1"

# Vision shadow casting 用 spatial index。可選: "quadtree" | "hash_grid" | "bvh" | "sap"。
[vision]
SPATIAL_INDEX = "quadtree"
SHG_CELL_SIZE = 128.0
QUADTREE_MAX_DEPTH = 8
QUADTREE_MAX_PER_NODE = 10
BVH_MAX_LEAF = 4

# Collision pre-detection 用 spatial index。Searcher 4 個類別獨立選演算法。
# 可選: "quadtree" | "hash_grid" | "bvh" | "sap"
# - tower: 大多靜態 → bvh / sap 都可
# - creep: 高頻移動 → sap / hash_grid 通常最快
# - hero: 數量少 → sap 簡單
# - region: 一次性靜態 → bvh / sap 都可
[collision]
SPATIAL_INDEX_TOWER = "sap"
SPATIAL_INDEX_CREEP = "sap"
SPATIAL_INDEX_HERO = "sap"
SPATIAL_INDEX_REGION = "sap"
SHG_CELL_SIZE = 128.0
QUADTREE_MAX_DEPTH = 8
QUADTREE_MAX_PER_NODE = 10
BVH_MAX_LEAF = 4
